<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Code Anatomy — Our New Home</title>
<style>
:root{--pk:#e91e63;--gn:#2e7d32;--pk-bg:rgba(233,30,99,.07);--gn-bg:rgba(46,125,50,.08);--gold:#f59e0b;--gold-bg:rgba(245,158,11,.1);--teal:#0d9488;--teal-bg:rgba(13,148,136,.08);--orange:#ff9800;--orange-bg:rgba(255,152,0,.08);--purple:#7c3aed;--purple-bg:rgba(124,58,237,.07);--bg:#faf5f8;--bg2:#fff;--card:rgba(255,255,255,.94);--txt:#2c3e50;--txt2:#555;--txt3:#999;--border:rgba(233,30,99,.12);--shadow:0 4px 20px rgba(0,0,0,.06);--rad:14px;--font:'Calibri','Segoe UI',system-ui,sans-serif}
@media(prefers-color-scheme:dark){:root{--bg:#1a1118;--bg2:#231920;--card:rgba(40,28,36,.94);--txt:#f0e8ec;--txt2:#bbb;--txt3:#777;--border:rgba(233,30,99,.2);--shadow:0 4px 20px rgba(0,0,0,.3);--pk-bg:rgba(233,30,99,.12);--gn-bg:rgba(46,125,50,.12);--gold-bg:rgba(245,158,11,.08);--teal-bg:rgba(13,148,136,.12);--orange-bg:rgba(255,152,0,.1);--purple-bg:rgba(124,58,237,.1)}}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:var(--font);background:var(--bg);color:var(--txt);line-height:1.5;padding:12px;max-width:800px;margin:0 auto;-webkit-tap-highlight-color:transparent}h1{font-size:1.4rem;text-align:center;margin:16px 0 4px;color:var(--pk)}.subtitle{text-align:center;font-size:.78rem;color:var(--txt3);margin-bottom:20px}.search-box{position:sticky;top:0;z-index:50;padding:8px 0;background:var(--bg)}.search-box input{width:100%;padding:10px 14px;border:2px solid var(--border);border-radius:30px;font-size:.85rem;font-family:var(--font);background:var(--bg2);color:var(--txt);outline:none;transition:border-color .2s}.search-box input:focus{border-color:var(--pk)}.search-box input::placeholder{color:var(--txt3)}.filters{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:16px}.fpill{padding:5px 14px;border-radius:20px;font-size:.72rem;font-weight:600;border:1.5px solid var(--border);background:var(--bg2);color:var(--txt2);cursor:pointer;transition:all .2s;user-select:none}.fpill.active{background:var(--pk);color:#fff;border-color:var(--pk)}.fpill[data-f="html"].active{background:var(--gn);border-color:var(--gn);color:#fff}.fpill[data-f="css"].active{background:var(--teal);border-color:var(--teal);color:#fff}.fpill[data-f="pattern"].active{background:var(--purple);border-color:var(--purple);color:#fff}.fpill[data-f="api"].active{background:var(--orange);border-color:var(--orange);color:#fff}.cat{margin-bottom:12px;border-radius:var(--rad);overflow:hidden;background:var(--card);box-shadow:var(--shadow);border:1px solid var(--border)}.cat-hdr{display:flex;align-items:center;gap:8px;padding:12px 14px;cursor:pointer;user-select:none;transition:background .15s}.cat-hdr:active{background:var(--pk-bg)}.cat-icon{font-size:1.1rem;flex-shrink:0}.cat-title{font-size:.82rem;font-weight:700;flex:1}.cat-count{font-size:.62rem;background:var(--pk-bg);color:var(--pk);padding:2px 8px;border-radius:12px;font-weight:700}.cat-arrow{font-size:.7rem;color:var(--txt3);transition:transform .3s;flex-shrink:0}.cat.open .cat-arrow{transform:rotate(180deg)}.cat-body{max-height:0;overflow:hidden;transition:max-height .4s cubic-bezier(.4,0,.2,1)}.cat.open .cat-body{max-height:300000px}.cat-inner{padding:0 14px 14px}.item{padding:8px 10px;margin-bottom:6px;border-radius:10px;background:var(--bg);border:1px solid transparent;transition:border-color .2s}.item:last-child{margin-bottom:0}.item-name{font-family:'Consolas','Menlo','Courier New',monospace;font-size:.78rem;font-weight:700;color:var(--pk);word-break:break-all}.item-name.html-c{color:var(--gn)}.item-name.css-c{color:var(--teal)}.item-name.pattern-c{color:var(--purple)}.item-name.api-c{color:var(--orange)}.item-type{display:inline-block;font-size:.58rem;font-weight:700;padding:1px 6px;border-radius:8px;margin-left:4px;vertical-align:middle}.item-type.js{background:var(--pk-bg);color:var(--pk)}.item-type.html{background:var(--gn-bg);color:var(--gn)}.item-type.css{background:var(--teal-bg);color:var(--teal)}.item-type.pattern{background:var(--purple-bg);color:var(--purple)}.item-type.api{background:var(--orange-bg);color:var(--orange)}.item-desc{font-size:.72rem;color:var(--txt2);margin-top:3px;line-height:1.45}.item-where{font-size:.6rem;color:var(--txt3);margin-top:2px;font-style:italic}.item.highlight{border-color:var(--pk);background:var(--pk-bg)}.tag{display:inline-block;font-size:.55rem;padding:1px 5px;border-radius:6px;margin-right:3px;margin-top:2px;font-weight:600}.tag-concept{background:var(--purple-bg);color:var(--purple)}.stats{display:flex;justify-content:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}.stat{text-align:center;padding:8px 14px;border-radius:var(--rad);background:var(--card);box-shadow:var(--shadow);min-width:70px}.stat-num{font-size:1.3rem;font-weight:800;color:var(--pk)}.stat-label{font-size:.58rem;color:var(--txt3);font-weight:600}.totop{position:fixed;bottom:16px;right:16px;width:40px;height:40px;border-radius:50%;background:var(--pk);color:#fff;border:none;font-size:1.1rem;cursor:pointer;box-shadow:0 4px 12px rgba(233,30,99,.3);display:none;z-index:90;transition:transform .2s}.totop:active{transform:scale(.9)}
</style>
</head>
<body>
<h1>Code Anatomy</h1>
<p class="subtitle">Our New Home — Move-in Planner for Mari & Alexander</p>
<div class="stats" id="stats"></div>
<div class="search-box"><input type="text" id="search" placeholder="Search... (e.g. canvas, floor plan, packing, voting, budget)"></div>
<div class="filters"><span class="fpill active" data-f="all" onclick="filterBy('all')">All</span><span class="fpill" data-f="js" onclick="filterBy('js')">JavaScript</span><span class="fpill" data-f="html" onclick="filterBy('html')">HTML</span><span class="fpill" data-f="css" onclick="filterBy('css')">CSS</span><span class="fpill" data-f="pattern" onclick="filterBy('pattern')">Patterns</span><span class="fpill" data-f="api" onclick="filterBy('api')">Web APIs</span></div>
<div id="content"></div>
<button class="totop" id="totop" onclick="window.scrollTo({top:0,behavior:'smooth'})">&#9650;</button>
<script>
const D=[
{icon:'🧩',title:'JS Modules (8 files, global functions)',tag:'js',desc:'Global-scope functions loaded in order. No module system — all functions are global, called via inline onclick handlers.',items:[
{name:'config.js — Constants & Definitions',type:'js',desc:'APP_VERSION, K storage keys, ROOMS (9 room types), ITEM_CATEGORIES (9 with types+specs), PROS/CONS_SUGGESTIONS, ITEM_STATUSES (6), BUY_PRIOS (3), SELL_PLATFORMS (5), CONDITIONS (5), ENERGY_COLORS, COMPANY_STATUS (5), OWNERS (3: Mari/Alex/Shared), DEFAULT_SETTINGS, FURNITURE (23 types with real meter dimensions for floor plan).',where:'js/config.js'},
{name:'preloaded.js — Preloaded Apartment Data',type:'js',desc:'PRELOADED_PLAN contains the full 92.29 m\u00B2 apartment layout. maybeInjectPreloaded() checks if data exists and seeds the apartment plan on first run.',where:'js/preloaded.js'},
{name:'utils.js — Helpers (30+ functions)',type:'js',desc:'uid() ID generator, esc() XSS sanitization, clone() deep copy, date helpers, fmtEur() Euro currency formatting, voteScore() couple voting calculator, progressBar() HTML builder, stars() rating display, energyBadge() energy class indicator, pill filter system (PILL_STATE object), chip input system, toast notifications, celebrate() confetti effect, confirmDlg() confirmation dialogs, inlineEdit(), form helpers (fVal/fNum/fChk/fSet).',where:'js/utils.js'},
{name:'data.js — localStorage CRUD Layer',type:'js',desc:'localStorage CRUD for 8 domains: plan, move, take (items to take), boxes, sell, buy, compare, settings. Activity logging system. Photo storage as dataURL strings. Budget/sell/packing stats calculators. Countdown to move-in date. exportAll/importAll for full backup.',where:'js/data.js'},
{name:'dashboard.js — Dashboard Tab',type:'js',desc:'rDash() renders countdown hero section, stat cards (items, budget, boxes, tasks), quick action buttons, recent activity feed, budget breakdown by room.',where:'js/dashboard.js'},
{name:'ui.js — Tab & Modal Management',type:'js',desc:'Tab switching between 7 views. Modal open/close system. Keyboard shortcuts: 1-7 for tabs, Esc to close modals, Ctrl+K for search. Pill filter builders per module.',where:'js/ui.js'},
{name:'plan.js — Canvas Floor Plan Editor',type:'js',desc:'Canvas 2D floor plan editor with undo/redo (30-step stack). Tools: select, room drawing, furniture placement, erase, paint/color. Multi-floor support. Grid snap for precise placement. Dimension labels showing real meters. Area calculation per room. Furniture placement with rotation and real-world dimensions.',where:'js/plan.js'},
{name:'buy.js — Buy/Wishlist Module',type:'js',desc:'Buy list and wishlist with budget tracking. Photo gallery per item. Couple voting system (voteM/voteA with yes/meh/no options). Comparison selection for side-by-side. Height visualization for furniture. Status pipeline tracking (researching/decided/ordered/shipped/delivered).',where:'js/buy.js'},
{name:'modules.js — Moving, Packing, Sell, Compare',type:'js',desc:'Moving companies (star rating, pros/cons chips, document checklist, 15-item move-day checklist). Packing/boxes (room-grouped, owner-filtered, box assignment with labels). Sell tracker (photos, conditions, platforms like eBay/Kleinanzeigen, earned/potential stats). Compare standalone (scoring algorithm, recommendation engine with weighted criteria).',where:'js/modules.js'},
]},
{icon:'🏗️',title:'HTML App Shell',tag:'html',desc:'7-tab move-in planning interface with sticky status bar.',items:[
{name:'7 Tab Navigation',type:'html',desc:'Dashboard, Plan (floor plan), Moving (companies), Packing (boxes), Sell (items to sell), Buy (items to buy), Compare (side-by-side). Tab switching renders the corresponding module.',where:'index.html'},
{name:'Sticky Status Bar',type:'html',desc:'Bottom status bar showing key metrics: days until move, budget status, packing progress.',where:'index.html'},
{name:'Modal System',type:'html',desc:'Shared modal container for all CRUD dialogs: add/edit items, company details, box management, voting.',where:'index.html'},
{name:'Scroll-to-Top Button',type:'html',desc:'Fixed position button appears on scroll, returns to top of page.',where:'index.html'},
]},
{icon:'🎨',title:'CSS Design',tag:'css',desc:'Rose/green palette with serif accent font.',items:[
{name:'Rose/Green Palette',type:'css',desc:'--pk #e11d48 (rose primary — slightly different from other projects), green secondary. Warm, home-feeling color scheme.',where:'css/styles.css'},
{name:'Fonts: DM Sans + DM Serif Display',type:'css',desc:'DM Sans for body text, DM Serif Display for headings and hero sections. Creates a warm, editorial feel.',where:'css/styles.css'},
{name:'Single CSS File',type:'css',desc:'All styles in one css/styles.css file. Cards, grids, canvas controls, pill filters, voting UI, photo galleries.',where:'css/styles.css'},
]},
{icon:'✨',title:'CSS Animations',tag:'css',desc:'Entrance effects, celebration, and budget warnings.',items:[
{name:'slideUp',type:'css',desc:'Cards and sections slide up into view on render.',where:'css/styles.css'},
{name:'popIn',type:'css',desc:'Scale-up pop entrance for stat cards and action buttons.',where:'css/styles.css'},
{name:'toastIn',type:'css',desc:'Toast notification entrance animation.',where:'css/styles.css'},
{name:'celpop — Celebration',type:'css',desc:'Confetti/celebration pop animation triggered on milestones (all boxes packed, move complete, etc.).',where:'css/styles.css'},
{name:'pulse-bg — Budget Warning',type:'css',desc:'Background pulse animation on budget cards when spending exceeds threshold.',where:'css/styles.css'},
]},
{icon:'🧬',title:'Design Patterns',tag:'pattern',desc:'Architectural patterns for a couple\'s move-in planning tool.',items:[
{name:'Global Functions (no modules)',type:'pattern',desc:'All functions are global scope. No IIFE, no ES modules, no revealing module. Simple and direct — every function callable from anywhere.',tags:['architecture']},
{name:'Pill Filter System',type:'pattern',desc:'PILL_STATE object tracks active filters per module. Pill buttons toggle filter state. Used across buy, sell, packing, and moving modules.',tags:['ux']},
{name:'Chip Input System',type:'pattern',desc:'Tag-style input where typing and pressing Enter creates a removable chip. Used for pros/cons on moving companies and item tags.',tags:['ux']},
{name:'Couple Voting (voteM/voteA)',type:'pattern',desc:'Each buy item has separate Mari and Alex votes (yes/meh/no). voteScore() calculates combined preference. Items sorted by couple agreement.',tags:['domain']},
{name:'Canvas Floor Plan with Undo/Redo',type:'pattern',desc:'Full Canvas 2D editor with 30-step undo/redo stack. Room drawing, furniture placement with real meter dimensions, multi-floor support, grid snapping.',tags:['architecture']},
{name:'Photo Storage as base64 Data URLs',type:'pattern',desc:'Photos stored directly in localStorage as base64 data URL strings. No server upload needed. Used in buy items and sell listings.',tags:['data']},
{name:'Activity Logging',type:'pattern',desc:'Every CRUD action is logged with timestamp. Dashboard activity feed shows recent changes across all modules.',tags:['data']},
]},
{icon:'🌐',title:'Web APIs',tag:'api',desc:'Browser features powering the app. Fully offline, no fetch.',items:[
{name:'localStorage',type:'api',desc:'All data for 8 domains: plan, move, take, boxes, sell, buy, compare, settings. Photos stored as base64 data URLs.',where:'js/data.js'},
{name:'Canvas 2D',type:'api',desc:'Floor plan editor: room drawing, furniture placement, dimension labels, area calculation, multi-floor rendering.',where:'js/plan.js'},
{name:'FileReader',type:'api',desc:'Photo import reads image files and converts to base64 data URLs for localStorage storage.',where:'js/buy.js, js/modules.js'},
{name:'Clipboard API',type:'api',desc:'Copy share links and exported data to clipboard.',where:'js/utils.js'},
{name:'Blob / URL.createObjectURL',type:'api',desc:'JSON export download and PNG export of floor plan canvas.',where:'js/data.js, js/plan.js'},
{name:'Touch Events',type:'api',desc:'Touch handling for the floor plan canvas editor on mobile devices. Pinch, drag, tap for furniture placement.',where:'js/plan.js'},
{name:'Keyboard Events',type:'api',desc:'Keyboard shortcuts: 1-7 for tabs, Esc to close modals, Ctrl+K for search, Ctrl+Z/Y for undo/redo in floor plan.',where:'js/ui.js'},
]},
{icon:'📁',title:'File Structure',tag:'js',desc:'Single HTML entry, one CSS file, 8 JS files.',items:[
{name:'index.html',type:'html',desc:'App shell with 7 tabs, sticky status bar, modals, scroll-to-top. Loads all scripts in order.',where:'root'},
{name:'css/styles.css',type:'css',desc:'All styles in single file. Rose palette, cards, canvas controls, pill filters, voting UI, photo galleries.',where:'css/'},
{name:'js/ (8 files)',type:'js',desc:'config.js, preloaded.js, utils.js, data.js, dashboard.js, ui.js, plan.js, buy.js, modules.js.',where:'js/'},
{name:'AWS Hooks (commented out)',type:'js',desc:'Future migration hooks to AWS are commented out in the codebase. Currently fully offline.',where:'js/data.js'},
]},
];
let activeFilter='all',searchTerm='';
function renderStats(){const c={all:0,js:0,html:0,css:0,pattern:0,api:0};D.forEach(d=>{c[d.tag]+=d.items.length;c.all+=d.items.length});document.getElementById('stats').innerHTML=`<div class="stat"><div class="stat-num">${c.all}</div><div class="stat-label">TOTAL</div></div><div class="stat"><div class="stat-num" style="color:var(--pk)">${c.js}</div><div class="stat-label">JS</div></div><div class="stat"><div class="stat-num" style="color:var(--gn)">${c.html}</div><div class="stat-label">HTML</div></div><div class="stat"><div class="stat-num" style="color:var(--teal)">${c.css}</div><div class="stat-label">CSS</div></div><div class="stat"><div class="stat-num" style="color:var(--purple)">${c.pattern}</div><div class="stat-label">PATTERNS</div></div><div class="stat"><div class="stat-num" style="color:var(--orange)">${c.api}</div><div class="stat-label">WEB APIs</div></div>`}
function renderContent(){const q=searchTerm.toLowerCase().trim();let h='';D.forEach((cat,ci)=>{if(activeFilter!=='all'&&cat.tag!==activeFilter)return;let items=cat.items;if(q)items=items.filter(it=>it.name.toLowerCase().includes(q)||it.desc.toLowerCase().includes(q)||(it.where||'').toLowerCase().includes(q)||(it.tags||[]).some(t=>t.toLowerCase().includes(q)));if(!items.length)return;h+=`<div class="cat${q?' open':''}" id="cat-${ci}"><div class="cat-hdr" onclick="toggleCat(${ci})"><span class="cat-icon">${cat.icon}</span><span class="cat-title">${cat.title}</span><span class="cat-count">${items.length}</span><span class="cat-arrow">&#9660;</span></div><div class="cat-body"><div class="cat-inner"><div style="font-size:.68rem;color:var(--txt3);margin-bottom:8px;line-height:1.4">${cat.desc}</div>${items.map(it=>{const hl=q&&it.name.toLowerCase().includes(q)?' highlight':'';const cc=it.type==='html'?' html-c':it.type==='css'?' css-c':it.type==='pattern'?' pattern-c':it.type==='api'?' api-c':'';return`<div class="item${hl}"><span class="item-name${cc}">${hm(it.name,q)}</span><span class="item-type ${it.type}">${it.type.toUpperCase()}</span>${(it.tags||[]).map(t=>`<span class="tag tag-concept">${t}</span>`).join('')}<div class="item-desc">${hm(it.desc,q)}</div>${it.where?`<div class="item-where">${hm(it.where,q)}</div>`:''}</div>`}).join('')}</div></div></div>`});if(!h)h='<div style="text-align:center;padding:40px;color:var(--txt3)">No results</div>';document.getElementById('content').innerHTML=h}
function hm(t,q){if(!q)return t;const i=t.toLowerCase().indexOf(q);if(i===-1)return t;return t.slice(0,i)+'<mark style="background:var(--gold-bg);color:inherit;padding:0 1px;border-radius:2px">'+t.slice(i,i+q.length)+'</mark>'+t.slice(i+q.length)}
function toggleCat(i){const e=document.getElementById('cat-'+i);if(e)e.classList.toggle('open')}
function filterBy(f){activeFilter=f;document.querySelectorAll('.fpill').forEach(p=>p.classList.toggle('active',p.dataset.f===f));renderContent()}
document.getElementById('search').addEventListener('input',function(){searchTerm=this.value;renderContent()});
window.addEventListener('scroll',function(){document.getElementById('totop').style.display=window.scrollY>400?'block':'none'});
renderStats();renderContent();
</script>
</body>
</html>
