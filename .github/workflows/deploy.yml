name: Deploy Home Planner

on:
  push:
    branches:
      - main

concurrency:
  group: home-planner-deploy
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  obfuscate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install obfuscation tooling
        run: |
          set -e
          npm install -g javascript-obfuscator
          python -m pip install --upgrade pip cssmin

      - name: Build protected artifact
        run: |
          set -e
          rm -rf dist_protected
          mkdir -p dist_protected
          rsync -a home/ dist_protected/

      - name: Resolve deployment gates
        id: gates
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
          HOME_PLANNER_STACK_NAME: ${{ secrets.HOME_PLANNER_STACK_NAME }}
          COGNITO_USER_POOL_ID: ${{ secrets.COGNITO_USER_POOL_ID }}
          COGNITO_APP_CLIENT_ID: ${{ secrets.COGNITO_APP_CLIENT_ID }}
        run: |
          set -e
          has_aws_creds=false
          has_backend_stack=false
          has_frontend_deploy=false

          if [ -n "${AWS_ACCESS_KEY_ID}" ] && [ -n "${AWS_SECRET_ACCESS_KEY}" ] && [ -n "${AWS_REGION}" ]; then
            has_aws_creds=true
          fi

          if [ "${has_aws_creds}" = true ] && [ -n "${HOME_PLANNER_STACK_NAME}" ] && [ -n "${COGNITO_USER_POOL_ID}" ] && [ -n "${COGNITO_APP_CLIENT_ID}" ]; then
            has_backend_stack=true
          fi

          if [ "${has_aws_creds}" = true ] && [ -n "${S3_BUCKET}" ] && [ -n "${CLOUDFRONT_DISTRIBUTION_ID}" ]; then
            has_frontend_deploy=true
          fi

          echo "has_aws_creds=${has_aws_creds}" >> "$GITHUB_OUTPUT"
          echo "has_backend_stack=${has_backend_stack}" >> "$GITHUB_OUTPUT"
          echo "has_frontend_deploy=${has_frontend_deploy}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        if: ${{ steps.gates.outputs.has_aws_creds == 'true' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy backend stack
        if: ${{ steps.gates.outputs.has_backend_stack == 'true' }}
        id: backend
        env:
          STACK_NAME: ${{ secrets.HOME_PLANNER_STACK_NAME }}
          COGNITO_USER_POOL_ID: ${{ secrets.COGNITO_USER_POOL_ID }}
          COGNITO_APP_CLIENT_ID: ${{ secrets.COGNITO_APP_CLIENT_ID }}
          STATE_TABLE_NAME: ${{ secrets.HOME_PLANNER_STATE_TABLE_NAME }}
          ACTIVITY_TABLE_NAME: ${{ secrets.HOME_PLANNER_ACTIVITY_TABLE_NAME }}
        run: |
          set -e
          if [ -z "${STACK_NAME}" ] || [ -z "${COGNITO_USER_POOL_ID}" ] || [ -z "${COGNITO_APP_CLIENT_ID}" ]; then
            echo "stack_deployed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          aws cloudformation deploy \
            --template-file infra/home-planner-stack.yaml \
            --stack-name "${STACK_NAME}" \
            --capabilities CAPABILITY_NAMED_IAM \
            --parameter-overrides \
              UserPoolId="${COGNITO_USER_POOL_ID}" \
              UserPoolClientId="${COGNITO_APP_CLIENT_ID}" \
              StateTableName="${STATE_TABLE_NAME:-home-planner-user-state}" \
              ActivityTableName="${ACTIVITY_TABLE_NAME:-home-planner-activity}"

          API_BASE=$(aws cloudformation describe-stacks --stack-name "${STACK_NAME}" --query "Stacks[0].Outputs[?OutputKey=='HttpApiUrl'].OutputValue" --output text)
          ACTIVITY_API=$(aws cloudformation describe-stacks --stack-name "${STACK_NAME}" --query "Stacks[0].Outputs[?OutputKey=='ActivityApiUrl'].OutputValue" --output text)
          STATE_API=$(aws cloudformation describe-stacks --stack-name "${STACK_NAME}" --query "Stacks[0].Outputs[?OutputKey=='StateApiUrl'].OutputValue" --output text)

          echo "stack_deployed=true" >> "$GITHUB_OUTPUT"
          echo "api_base=${API_BASE}" >> "$GITHUB_OUTPUT"
          echo "activity_api=${ACTIVITY_API}" >> "$GITHUB_OUTPUT"
          echo "state_api=${STATE_API}" >> "$GITHUB_OUTPUT"

      - name: Inject runtime AWS config
        env:
          COGNITO_REGION: ${{ secrets.COGNITO_REGION }}
          COGNITO_USER_POOL_ID: ${{ secrets.COGNITO_USER_POOL_ID }}
          COGNITO_APP_CLIENT_ID: ${{ secrets.COGNITO_APP_CLIENT_ID }}
          AWS_ACTIVITY_API_URL: ${{ secrets.AWS_ACTIVITY_API_URL }}
          AWS_DATA_SYNC_API_URL: ${{ secrets.AWS_DATA_SYNC_API_URL }}
        run: |
          set -e
          ACTIVITY_URL='${{ steps.backend.outputs.activity_api }}'
          STATE_URL='${{ steps.backend.outputs.state_api }}'
          if [ -z "${ACTIVITY_URL}" ]; then ACTIVITY_URL="${AWS_ACTIVITY_API_URL}"; fi
          if [ -z "${STATE_URL}" ]; then STATE_URL="${AWS_DATA_SYNC_API_URL}"; fi
          cat > dist_protected/js/runtime-config.js <<EOF
          window.__HOME_AUTH_CONFIG__ = Object.assign({}, window.__HOME_AUTH_CONFIG__ || {}, {
            region: '${COGNITO_REGION}',
            userPoolId: '${COGNITO_USER_POOL_ID}',
            clientId: '${COGNITO_APP_CLIENT_ID}',
            storageMode: 'session'
          });
          window.__HOME_AWS_CONFIG__ = Object.assign({}, window.__HOME_AWS_CONFIG__ || {}, {
            region: '${COGNITO_REGION}',
            mode: 'api_gateway_lambda_dynamo',
            activityApiUrl: '${ACTIVITY_URL}',
            dataSyncUrl: '${STATE_URL}'
          });
          EOF

      - name: Obfuscate JavaScript
        run: |
          set -e
          while IFS= read -r file; do
            temp_file="${file}.obf"
            javascript-obfuscator "$file" \
              --output "$temp_file" \
              --compact true \
              --control-flow-flattening true \
              --control-flow-flattening-threshold 0.5 \
              --dead-code-injection true \
              --dead-code-injection-threshold 0.2 \
              --string-array true \
              --string-array-encoding rc4 \
              --string-array-threshold 0.75 \
              --rename-globals false \
              --self-defending true \
              --disable-console-output false \
              --identifier-names-generator hexadecimal
            mv "$temp_file" "$file"
          done < <(find dist_protected -type f -name '*.js')

      - name: Minify CSS
        run: |
          set -e
          python - <<'PY'
          import pathlib
          import cssmin

          for path in pathlib.Path('dist_protected').rglob('*.css'):
              path.write_text(cssmin.cssmin(path.read_text(encoding='utf-8')), encoding='utf-8')
          PY

      - name: Strip HTML comments and collapse whitespace
        run: |
          set -e
          python - <<'PY'
          import pathlib
          import re

          comment_re = re.compile(r'<!--(?!\s*\[if).*?-->', re.S)
          space_re = re.compile(r'>\s+<')

          for path in pathlib.Path('dist_protected').rglob('*.html'):
              text = path.read_text(encoding='utf-8')
              text = comment_re.sub('', text)
              text = space_re.sub('><', text)
              path.write_text(text.strip(), encoding='utf-8')
          PY

      - name: Validate protected JavaScript
        run: |
          set -e
          while IFS= read -r file; do
            node --check "$file"
          done < <(find dist_protected -type f -name '*.js')

      - name: Sync protected build to S3
        if: ${{ steps.gates.outputs.has_frontend_deploy == 'true' }}
        env:
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: |
          set -e
          aws s3 sync dist_protected "s3://${S3_BUCKET}" --delete --exact-timestamps

      - name: Normalize content types
        if: ${{ steps.gates.outputs.has_frontend_deploy == 'true' }}
        env:
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: |
          set -e
          while IFS= read -r file; do
            key="${file#dist_protected/}"
            aws s3 cp "$file" "s3://${S3_BUCKET}/${key}" --content-type text/html --cache-control no-cache
          done < <(find dist_protected -type f -name '*.html')

          while IFS= read -r file; do
            key="${file#dist_protected/}"
            aws s3 cp "$file" "s3://${S3_BUCKET}/${key}" --content-type application/javascript --cache-control no-cache
          done < <(find dist_protected -type f -name '*.js')

          while IFS= read -r file; do
            key="${file#dist_protected/}"
            aws s3 cp "$file" "s3://${S3_BUCKET}/${key}" --content-type text/css --cache-control no-cache
          done < <(find dist_protected -type f -name '*.css')

          if [ -f dist_protected/manifest.webmanifest ]; then
            aws s3 cp dist_protected/manifest.webmanifest "s3://${S3_BUCKET}/manifest.webmanifest" --content-type application/manifest+json --cache-control no-cache
          fi

      - name: Invalidate CloudFront cache
        if: ${{ steps.gates.outputs.has_frontend_deploy == 'true' }}
        env:
          DIST_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          set -e
          aws cloudfront create-invalidation --distribution-id "${DIST_ID}" --paths "/*"

      - name: Print deployment summary
        if: ${{ steps.gates.outputs.has_frontend_deploy == 'true' }}
        env:
          DIST_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          set -e
          DOMAIN=$(aws cloudfront get-distribution --id "${DIST_ID}" --query 'Distribution.DomainName' --output text)
          echo "CloudFront URL: https://${DOMAIN}/index.html"
          echo "Deployed at: $(date -u '+%Y-%m-%dT%H:%M:%SZ')"

      - name: Print skipped deploy summary
        if: ${{ steps.gates.outputs.has_frontend_deploy != 'true' }}
        run: |
          echo "Protected artifact was built, but S3/CloudFront deployment was skipped."
          echo "Missing one or more required secrets: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_REGION, S3_BUCKET, CLOUDFRONT_DISTRIBUTION_ID."
